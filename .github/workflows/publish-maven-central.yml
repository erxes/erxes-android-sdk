name: Publish Maven Central

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<EOF
          org.gradle.configuration-cache=false
          mavenCentralUsername=${MAVEN_CENTRAL_USERNAME}
          mavenCentralPassword=${MAVEN_CENTRAL_PASSWORD}
          signingInMemoryKey=${SIGNING_IN_MEMORY_KEY}
          signingInMemoryKeyPassword=${SIGNING_IN_MEMORY_KEY_PASSWORD}
          EOF
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}

      - name: Publish and release to Maven Central
        run: ./gradlew :messenger-sdk:publishAndReleaseToMavenCentral --no-configuration-cache --no-daemon
